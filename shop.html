<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unser Shop</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <!-- Video Background -->
    <video autoplay muted loop playsinline id="video-background">
        <source src="https://cdn.pixabay.com/video/2024/05/29/214402_large.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>

    <header>
        <img src="IHTC5804[1].PNG" alt="Logo" class="site-logo">
        <nav>
            <a href="index.html">Zurück zur Startseite</a>
        </nav>
    </header>

    <main class="shop-container">
        <section class="product-list">
            <h2>Unsere Produkte</h2>
            <div id="categories" class="category-filter">
                <!-- Kategorie-Buttons werden hier dynamisch geladen -->
            </div>
            <div id="products">
                <!-- Produkte werden hier dynamisch geladen -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 Dein Shop Name</p>
    </footer>

    <script src="shop-script.js"></script>
</body>
</html>
