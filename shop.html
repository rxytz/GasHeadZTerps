<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unser Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Unser Shop</h1>
        <nav>
            <a href="index.html">Zurück zur Startseite</a>
        </nav>
    </header>

    <main class="shop-container">
        <section class="product-list">
            <h2>Unsere Produkte</h2>
            <div id="products">
                <!-- Produkte werden hier dynamisch geladen -->
            </div>
        </section>

        <aside class="cart">
            <h2>Warenkorb</h2>
            <ul id="cart-items">
                <!-- Warenkorb-Elemente werden hier angezeigt -->
            </ul>
            <div class="cart-total">
                <strong>Gesamt:</strong> <span id="cart-total-amount">0.00</span> €
            </div>
            <button id="checkout-button" class="cta-button">Zur Kasse</button>
        </aside>
    </main>

    <footer>
        <p>&copy; 2023 Dein Shop Name</p>
    </footer>

    <script src="shop-script.js"></script>
</body>
</html>
