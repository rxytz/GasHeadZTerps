<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unser Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Video Background -->
    <video autoplay muted loop playsinline id="video-background">
        <source src="https://cdn.pixabay.com/video/2024/05/29/214402_large.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>

    <header>
        <h1>Unser Shop</h1>
        <nav>
            <a href="index.html">Zurück zur Startseite</a>
            <button id="cart-button" class="cart-toggle-btn">🛒 Warenkorb</button>
        </nav>
    </header>

    <main class="shop-container">
        <section class="product-list">
            <h2>Unsere Produkte</h2>
            <div id="products">
                <!-- Produkte werden hier dynamisch geladen -->
            </div>
        </section>
    </main>

    <!-- Cart Modal -->
    <div id="cart-modal" class="cart-modal">
        <div class="cart-modal-content">
            <span class="cart-close">&times;</span>
            <h2>Warenkorb</h2>
            <ul id="cart-items">
                <!-- Warenkorb-Elemente werden hier angezeigt -->
            </ul>
            <div class="cart-total">
                <strong>Gesamt:</strong> <span id="cart-total-amount">0.00</span> €
            </div>
            <button id="checkout-button" class="cta-button">Zur Kasse</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2023 Dein Shop Name</p>
    </footer>

    <script src="shop-script.js"></script>
</body>
</html>
