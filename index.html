<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini Shop</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <video id="flame-video" autoplay loop muted playsinline>
        <source src="219971_medium.mp4" type="video/mp4">
    </video>
    <canvas id="bg-canvas"></canvas>
    <header>
        <div class="logo-container">
            <h1 class="logo-glow">Mini Shop</h1>
        </div>
        <button id="cart-btn" title="Warenkorb öffnen">
            🛒 <span id="cart-count">0</span>
        </button>
    </header>
    <main>
        <section id="products"></section>
    </main>
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close" id="close-cart">&times;</span>
            <h2>Warenkorb</h2>
            <ul id="cart-items"></ul>
            <button id="checkout">Zur Kasse</button>
        </div>
    </div>
    <footer>
        <p>© 2026 Mini Shop</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
