<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini Shop</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <video id="flame-video" src="219971_medium.mp4" autoplay loop muted playsinline style="position:fixed;left:0;top:0;width:100vw;height:100vh;object-fit:cover;z-index:-2;"></video>
    <canvas id="flame-canvas"></canvas>
    <canvas id="bg-canvas"></canvas>
    <header>
        <div class="logo-container">
            <h1 class="logo-glow">Mini Shop</h1>
        </div>
        <button id="cart-btn" title="Warenkorb öffnen">
            🛒 <span id="cart-count">0</span>
        </button>
    </header>
    <main>
        <section id="products"></section>
        <section id="cart">
            <h2>Warenkorb</h2>
            <ul id="cart-items"></ul>
            <button id="checkout">Zur Kasse</button>
        </section>
    </main>
    <footer>
        <p>© 2026 Mini Shop</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
