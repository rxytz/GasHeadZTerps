<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini Shop</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <header>
        <div class="header-row">
            <button id="info-btn" title="Info anzeigen">ℹ️</button>
            <div class="logo-container">
                <h1 class="logo-glow">Mini Shop</h1>
            </div>
            <button id="cart-btn" title="Warenkorb öffnen">
                🛒 <span id="cart-count">0</span>
            </button>
        </div>
    </header>
        <button id="info-btn" title="Info anzeigen">ℹ️</button>
        <button id="cart-btn" title="Warenkorb öffnen">
            🛒 <span id="cart-count">0</span>
        </button>
        <div id="info-modal" class="modal">
            <div class="modal-content">
                <span class="close" id="close-info">&times;</span>
                <h2>Info</h2>
                <p id="info-message">Hier kannst du deine Info oder Hinweise eintragen!</p>
            </div>
        </div>
    </header>
    <main>
        <section id="products"></section>
    </main>
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close" id="close-cart">&times;</span>
            <h2>Warenkorb</h2>
            <ul id="cart-items"></ul>
            <button id="checkout">Zur Kasse</button>
        </div>
    </div>
    <div id="checkout-modal" class="modal">
        <div class="modal-content">
            <span class="close" id="close-checkout">&times;</span>
            <h2>Hinweis</h2>
            <p id="checkout-message">Bitte überprüfe deine Bestellung und folge den weiteren Anweisungen.</p>
        </div>
    </div>
    <footer>
        <p>© 2026 Mini Shop</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
