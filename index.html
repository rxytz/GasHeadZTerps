<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GasHeadZ Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-row">
            <div class="logo-container">
                <h1 class="logo-glow">GasHeadZ</h1>
            </div>
            <button id="cart-btn" title="Warenkorb öffnen">
                <span class="icon-cart">🛒</span> <span id="cart-count">0</span>
            </button>
        </div>
    </header>
    <main>
        <section id="products"></section>
        <button id="info-btn" title="Info anzeigen" class="floating-info-btn">
            <span class="icon-info">ℹ️</span>
        </button>
    </main>
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close" id="close-cart">&times;</span>
            <h2>Warenkorb</h2>
            <ul id="cart-items"></ul>
            <button id="checkout">Zur Kasse</button>
        </div>
    </div>
    <div id="checkout-modal" class="modal">
        <div class="modal-content">
            <span class="close" id="close-checkout">&times;</span>
            <h2>Hinweis</h2>
            <p id="checkout-message">Bitte überprüfe deine Bestellung und folge den weiteren Anweisungen.</p>
        </div>
    </div>
    <div id="info-modal" class="modal">
        <div class="modal-content">
            <span class="close" id="close-info">&times;</span>
            <h2>Info</h2>
            <p id="info-message">Hier kannst du deine Info oder Hinweise eintragen!</p>
        </div>
    </div>
    <footer>
        <p>© 2026 GasHeadZ Shop</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
